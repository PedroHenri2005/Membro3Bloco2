<div id="painelPrincipal">
    <div id="protecaoPlayer">
        <button id="protecaoButton">Iniciar Estudos</button>
    </div>
    <div id="player"></div> 
    <div id="botoes">
        <button id="anterior">Frase anterior</button>
        <button id="estudardepois">Estudar depois</button>
        <button id="proximo">Próxima frase</button>
    </div>
</div>

<div id="painelLateral">
    <div id="legendaPai">
        <button id="ocultar">
            <img id="olho" src="/static/img/olho.svg" alt="Ocultar">
        </button>
        <div id="legenda">
            Legendas
        </div>
    </div>
    
    <div id="panel">
        <canvas id="wave" width="700" height="120"></canvas>
        
        <div class="mic-area">
            <div id="transcript">Fale algo...</div>
            <button id="gravar">
                <img src="/static/img/mic.svg" alt="Gravar">
            </button>
        </div>
    </div>
</div>

<div id="carregamento">
    <p>Extraindo legendas do vídeo... Isso pode levar alguns segundos.</p>
    <p><i class="fa fa-spinner w3-spin" style="font-size:64px"></i></p>
</div>
